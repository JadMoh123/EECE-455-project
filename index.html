<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AES-128 Encryption Visualizer</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07090f; --surface: #0d1017; --surface2: #121721; --surface3: #181e2c;
    --border: #1e2538; --border-lit: #2a3350; --text: #cdd3e0; --text-dim: #6b7394;
    --text-bright: #eaf0ff; --accent: #00e5ff; --accent-dim: rgba(0,229,255,0.12);
    --accent-glow: rgba(0,229,255,0.25); --green: #00e676; --orange: #ffab40;
    --red: #ff5252; --pink: #f06292;
    --mono: 'IBM Plex Mono', monospace; --sans: 'Outfit', sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 60px 60px; opacity: 0.15; pointer-events: none; z-index: 0;
  }
  .app { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: 40px 24px 80px; }
  .header { margin-bottom: 36px; animation: fadeSlide 0.6s ease-out; }
  .header h1 { font-family: var(--sans); font-size: 32px; font-weight: 800; letter-spacing: -1px; color: var(--text-bright); line-height: 1; }
  .header h1 span { color: var(--accent); text-shadow: 0 0 30px var(--accent-glow); }
  .header .sub { font-family: var(--mono); font-size: 12px; color: var(--text-dim); margin-top: 8px; letter-spacing: 1.5px; text-transform: uppercase; }
  .header .credits { font-family: var(--mono); font-size: 11px; color: var(--text-dim); margin-top: 10px; letter-spacing: 0.5px; }
  .header .credits span { color: var(--text); }
  .input-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 24px; animation: fadeSlide 0.6s ease-out 0.1s both; }
  .input-row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
  .input-group { flex: 1; min-width: 280px; }
  .input-group label { display: block; font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 6px; }
  .input-group input { width: 100%; padding: 12px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--accent); font-family: var(--mono); font-size: 15px; letter-spacing: 1.5px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
  .input-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
  .input-group input::placeholder { color: var(--border-lit); }
  .char-count { font-family: var(--mono); font-size: 10px; color: var(--text-dim); margin-top: 4px; text-align: right; }
  .char-count.ok { color: var(--green); }
  .char-count.bad { color: var(--red); }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn { padding: 11px 28px; border: none; border-radius: 8px; font-family: var(--sans); font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; letter-spacing: 0.3px; }
  .btn-primary { background: var(--accent); color: var(--bg); box-shadow: 0 0 20px var(--accent-dim); }
  .btn-primary:hover { box-shadow: 0 0 30px var(--accent-glow); transform: translateY(-1px); }
  .btn-secondary { background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--surface3); color: var(--text); border-color: var(--border-lit); }
  .btn-secondary.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .error-msg { font-family: var(--mono); font-size: 12px; color: var(--red); margin-top: 12px; padding: 8px 12px; background: rgba(255,82,82,0.08); border-radius: 6px; border-left: 3px solid var(--red); }
  .result-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; margin-bottom: 20px; animation: fadeSlide 0.4s ease-out; }
  .result-card.cipher { border-color: var(--accent); box-shadow: 0 0 40px rgba(0,229,255,0.06); }
  .section-label { font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 12px; }
  .cipher-hex { font-family: var(--mono); font-size: 16px; color: var(--accent); letter-spacing: 2px; word-break: break-all; margin-top: 12px; text-shadow: 0 0 20px var(--accent-glow); }
  .matrix-wrap { display: inline-block; margin: 0 10px 12px 0; vertical-align: top; }
  .matrix-label { font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 5px; }
  .matrix-label.sub { color: var(--orange); }
  .matrix-label.shift { color: var(--pink); }
  .matrix-label.mix { color: var(--green); }
  .matrix-label.key { color: var(--text-dim); }
  .matrix-label.result { color: var(--accent); }
  .matrix { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; padding: 4px; border-radius: 6px; background: var(--bg); border: 1px solid var(--border); }
  .matrix.highlight { border-color: var(--accent); background: rgba(0,229,255,0.03); box-shadow: 0 0 12px rgba(0,229,255,0.06); }
  .matrix .cell { font-family: var(--mono); font-size: 12px; font-weight: 500; padding: 4px 6px; text-align: center; border-radius: 3px; background: var(--surface); color: var(--text); letter-spacing: 0.5px; }
  .matrix.highlight .cell { background: var(--surface2); color: var(--accent); }
  .round-item { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 6px; overflow: hidden; transition: border-color 0.2s; animation: fadeSlide 0.3s ease-out; }
  .round-item.open { border-color: var(--border-lit); }
  .round-header { padding: 12px 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; user-select: none; transition: background 0.15s; }
  .round-header:hover { background: var(--surface2); }
  .round-header .round-name { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--text); transition: color 0.15s; }
  .round-item.open .round-name { color: var(--accent); }
  .round-header .arrow { font-size: 14px; color: var(--text-dim); transition: transform 0.25s; }
  .round-item.open .arrow { transform: rotate(180deg); }
  .round-body { padding: 6px 16px 18px; display: flex; flex-wrap: wrap; gap: 6px; align-items: flex-start; border-top: 1px solid var(--border); }
  .keys-grid { display: flex; flex-wrap: wrap; gap: 6px; }
  @keyframes fadeSlide { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 20px var(--accent-dim); } 50% { box-shadow: 0 0 35px var(--accent-glow); } }
  @keyframes slideInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes slideInLeft { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border-lit); border-radius: 3px; }

  /* Chatbot */
  .chat-fab { position: fixed; bottom: 24px; right: 24px; width: 60px; height: 60px; border-radius: 50%; background: var(--accent); color: var(--bg); border: none; cursor: pointer; font-size: 26px; display: flex; align-items: center; justify-content: center; animation: pulse 2.5s ease-in-out infinite; z-index: 100; transition: transform 0.2s; }
  .chat-fab:hover { transform: scale(1.08); }
  .chat-fab.hidden { display: none; }
  .chat-panel { position: fixed; bottom: 24px; right: 24px; width: 380px; max-width: calc(100vw - 40px); height: 560px; max-height: calc(100vh - 60px); background: var(--surface); border: 1px solid var(--border-lit); border-radius: 16px; display: none; flex-direction: column; z-index: 101; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.5), 0 0 0 1px var(--accent-dim); animation: fadeSlide 0.25s ease-out; }
  .chat-panel.open { display: flex; }
  .chat-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: linear-gradient(180deg, var(--surface2), var(--surface)); }
  .chat-header .title { font-family: var(--sans); font-size: 15px; font-weight: 700; color: var(--text-bright); display: flex; align-items: center; gap: 8px; }
  .chat-header .title::before { content: ''; width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); }
  .chat-header .close { background: none; border: none; color: var(--text-dim); font-size: 20px; cursor: pointer; padding: 4px 8px; line-height: 1; }
  .chat-header .close:hover { color: var(--text); }
  .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .msg { max-width: 85%; padding: 10px 14px; border-radius: 14px; font-size: 13.5px; line-height: 1.5; }
  .msg.bot { background: var(--surface2); color: var(--text); align-self: flex-start; border-bottom-left-radius: 4px; animation: slideInLeft 0.25s ease-out; }
  .msg.user { background: var(--accent); color: var(--bg); align-self: flex-end; border-bottom-right-radius: 4px; font-weight: 500; animation: slideInRight 0.25s ease-out; }
  .msg strong { color: var(--accent); font-weight: 600; }
  .msg.bot strong { color: var(--accent); }
  .msg code { font-family: var(--mono); font-size: 12px; padding: 1px 5px; background: var(--bg); border-radius: 3px; color: var(--accent); }
  .chat-quick { padding: 10px 14px 0; display: flex; flex-wrap: wrap; gap: 6px; border-top: 1px solid var(--border); }
  .quick-btn { font-family: var(--mono); font-size: 11px; padding: 6px 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 14px; color: var(--text-dim); cursor: pointer; transition: all 0.15s; }
  .quick-btn:hover { border-color: var(--accent); color: var(--accent); }
  .chat-input-row { padding: 12px 14px 14px; display: flex; gap: 8px; }
  .chat-input { flex: 1; padding: 10px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 22px; color: var(--text); font-family: var(--sans); font-size: 13.5px; outline: none; transition: border-color 0.2s; }
  .chat-input:focus { border-color: var(--accent); }
  .chat-send { background: var(--accent); color: var(--bg); border: none; border-radius: 50%; width: 38px; height: 38px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: transform 0.15s; }
  .chat-send:hover { transform: scale(1.08); }
</style>
</head>
<body>
<div class="app" id="app">
  <div class="header">
    <h1><span>AES-128</span> Encryption Visualizer</h1>
    <div class="sub">Lookup-table implementation &middot; round-by-round state &amp; key expansion</div>
    <div class="credits">EECE 455 &middot; <span>Jad Moharam</span> · <span>Mohamed Dayeh</span> · <span>Mohamad Taha</span> · <span>Ali Waked</span></div>
  </div>
  <div class="input-panel">
    <div class="input-row">
      <div class="input-group">
        <label>Plaintext (hex)</label>
        <input id="msgInput" maxlength="32" placeholder="3243f6a8885a308d313198a2e0370734" spellcheck="false">
        <div class="char-count" id="msgCount">0 / 32</div>
      </div>
      <div class="input-group">
        <label>Key (hex)</label>
        <input id="keyInput" maxlength="32" placeholder="2b7e151628aed2a6abf7158809cf4f3c" spellcheck="false">
        <div class="char-count" id="keyCount">0 / 32</div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="encryptBtn">Encrypt</button>
      <button class="btn btn-secondary" id="keysBtn">Show Key Schedule</button>
    </div>
    <div id="errorBox" style="display:none" class="error-msg"></div>
  </div>
  <div id="output"></div>
</div>

<button class="chat-fab" id="chatFab" title="Need help? Ask the assistant">💬</button>
<div class="chat-panel" id="chatPanel">
  <div class="chat-header">
    <div class="title">AES Assistant</div>
    <button class="close" id="chatClose">×</button>
  </div>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="chat-quick" id="chatQuick"></div>
  <div class="chat-input-row">
    <input class="chat-input" id="chatInput" placeholder="Ask anything about AES..." />
    <button class="chat-send" id="chatSend">➤</button>
  </div>
</div>

<script>
const SBOX = [
  0x63,0x7c,0x77,0x7b,0xf2,0x6b,0x6f,0xc5,0x30,0x01,0x67,0x2b,0xfe,0xd7,0xab,0x76,
  0xca,0x82,0xc9,0x7d,0xfa,0x59,0x47,0xf0,0xad,0xd4,0xa2,0xaf,0x9c,0xa4,0x72,0xc0,
  0xb7,0xfd,0x93,0x26,0x36,0x3f,0xf7,0xcc,0x34,0xa5,0xe5,0xf1,0x71,0xd8,0x31,0x15,
  0x04,0xc7,0x23,0xc3,0x18,0x96,0x05,0x9a,0x07,0x12,0x80,0xe2,0xeb,0x27,0xb2,0x75,
  0x09,0x83,0x2c,0x1a,0x1b,0x6e,0x5a,0xa0,0x52,0x3b,0xd6,0xb3,0x29,0xe3,0x2f,0x84,
  0x53,0xd1,0x00,0xed,0x20,0xfc,0xb1,0x5b,0x6a,0xcb,0xbe,0x39,0x4a,0x4c,0x58,0xcf,
  0xd0,0xef,0xaa,0xfb,0x43,0x4d,0x33,0x85,0x45,0xf9,0x02,0x7f,0x50,0x3c,0x9f,0xa8,
  0x51,0xa3,0x40,0x8f,0x92,0x9d,0x38,0xf5,0xbc,0xb6,0xda,0x21,0x10,0xff,0xf3,0xd2,
  0xcd,0x0c,0x13,0xec,0x5f,0x97,0x44,0x17,0xc4,0xa7,0x7e,0x3d,0x64,0x5d,0x19,0x73,
  0x60,0x81,0x4f,0xdc,0x22,0x2a,0x90,0x88,0x46,0xee,0xb8,0x14,0xde,0x5e,0x0b,0xdb,
  0xe0,0x32,0x3a,0x0a,0x49,0x06,0x24,0x5c,0xc2,0xd3,0xac,0x62,0x91,0x95,0xe4,0x79,
  0xe7,0xc8,0x37,0x6d,0x8d,0xd5,0x4e,0xa9,0x6c,0x56,0xf4,0xea,0x65,0x7a,0xae,0x08,
  0xba,0x78,0x25,0x2e,0x1c,0xa6,0xb4,0xc6,0xe8,0xdd,0x74,0x1f,0x4b,0xbd,0x8b,0x8a,
  0x70,0x3e,0xb5,0x66,0x48,0x03,0xf6,0x0e,0x61,0x35,0x57,0xb9,0x86,0xc1,0x1d,0x9e,
  0xe1,0xf8,0x98,0x11,0x69,0xd9,0x8e,0x94,0x9b,0x1e,0x87,0xe9,0xce,0x55,0x28,0xdf,
  0x8c,0xa1,0x89,0x0d,0xbf,0xe6,0x42,0x68,0x41,0x99,0x2d,0x0f,0xb0,0x54,0xbb,0x16
];
const RCON = [[0x01,0x00,0x00,0x00],[0x02,0x00,0x00,0x00],[0x04,0x00,0x00,0x00],[0x08,0x00,0x00,0x00],[0x10,0x00,0x00,0x00],[0x20,0x00,0x00,0x00],[0x40,0x00,0x00,0x00],[0x80,0x00,0x00,0x00],[0x1b,0x00,0x00,0x00],[0x36,0x00,0x00,0x00]];

function gmul(a, b) { let p = 0; for (let i = 0; i < 8; i++) { if (b & 1) p ^= a; const hi = a & 0x80; a = (a << 1) & 0xff; if (hi) a ^= 0x1b; b >>= 1; } return p; }
function subBytes(s) { return s.map(r => r.map(b => SBOX[b])); }
function shiftRows(s) { const o = s.map(r => [...r]); [o[1][0],o[1][1],o[1][2],o[1][3]] = [o[1][1],o[1][2],o[1][3],o[1][0]]; [o[2][0],o[2][1],o[2][2],o[2][3]] = [o[2][2],o[2][3],o[2][0],o[2][1]]; [o[3][0],o[3][1],o[3][2],o[3][3]] = [o[3][3],o[3][0],o[3][1],o[3][2]]; return o; }
function mixColumns(s) { const o = Array.from({length:4}, () => Array(4).fill(0)); for (let c = 0; c < 4; c++) { o[0][c] = gmul(2,s[0][c])^gmul(3,s[1][c])^s[2][c]^s[3][c]; o[1][c] = s[0][c]^gmul(2,s[1][c])^gmul(3,s[2][c])^s[3][c]; o[2][c] = s[0][c]^s[1][c]^gmul(2,s[2][c])^gmul(3,s[3][c]); o[3][c] = gmul(3,s[0][c])^s[1][c]^s[2][c]^gmul(2,s[3][c]); } return o; }
function addRoundKey(s, rk) { return s.map((r,i) => r.map((b,j) => b ^ rk[i][j])); }
function keyExpansion(key) { const w = []; for (let i = 0; i < 4; i++) w[i] = [key[0][i], key[1][i], key[2][i], key[3][i]]; for (let i = 4; i < 44; i++) { let t = [...w[i-1]]; if (i % 4 === 0) { t = [t[1],t[2],t[3],t[0]].map(b => SBOX[b]); t = t.map((b,j) => b ^ RCON[i/4-1][j]); } w[i] = w[i-4].map((b,j) => b ^ t[j]); } const rks = []; for (let r = 0; r <= 10; r++) { const rk = Array.from({length:4}, () => Array(4).fill(0)); for (let c = 0; c < 4; c++) for (let row = 0; row < 4; row++) rk[row][c] = w[r*4+c][row]; rks.push(rk); } return rks; }
function hexToState(hex) { const c = hex.replace(/\s/g,''); if (c.length !== 32 || !/^[0-9a-fA-F]{32}$/.test(c)) return null; const bytes = []; for (let i = 0; i < 32; i += 2) bytes.push(parseInt(c.substr(i,2),16)); const s = Array.from({length:4}, () => Array(4).fill(0)); for (let i = 0; i < 16; i++) s[i%4][Math.floor(i/4)] = bytes[i]; return s; }
function toHex(b) { return b.toString(16).padStart(2,'0').toUpperCase(); }
function stateToHexStr(s) { let out = ''; for (let c = 0; c < 4; c++) for (let r = 0; r < 4; r++) out += toHex(s[r][c]); return out; }
function aesEncrypt(pt, key) { const rks = keyExpansion(key); const rounds = []; let s = pt.map(r => [...r]); s = addRoundKey(s, rks[0]); rounds.push({ round:0, label:'Initial Round (AddRoundKey)', addRoundKey:s.map(r=>[...r]), roundKey:rks[0] }); for (let r = 1; r <= 9; r++) { const sb = subBytes(s); const sr = shiftRows(sb); const mc = mixColumns(sr); s = addRoundKey(mc, rks[r]); rounds.push({ round:r, label:'Round '+r, subBytes:sb.map(r=>[...r]), shiftRows:sr.map(r=>[...r]), mixColumns:mc.map(r=>[...r]), addRoundKey:s.map(r=>[...r]), roundKey:rks[r] }); } const sb = subBytes(s); const sr = shiftRows(sb); s = addRoundKey(sr, rks[10]); rounds.push({ round:10, label:'Round 10 (Final — No MixColumns)', subBytes:sb.map(r=>[...r]), shiftRows:sr.map(r=>[...r]), addRoundKey:s.map(r=>[...r]), roundKey:rks[10] }); return { ciphertext:s, rounds, roundKeys:rks }; }

function renderMatrix(data, label, labelClass, highlight) { const cells = data.flat().map(b => `<div class="cell">${toHex(b)}</div>`).join(''); return `<div class="matrix-wrap">${label ? `<div class="matrix-label ${labelClass||''}">${label}</div>` : ''}<div class="matrix${highlight?' highlight':''}">${cells}</div></div>`; }

const msgInput = document.getElementById('msgInput');
const keyInput = document.getElementById('keyInput');
const msgCount = document.getElementById('msgCount');
const keyCount = document.getElementById('keyCount');
const errorBox = document.getElementById('errorBox');
const output = document.getElementById('output');
const encryptBtn = document.getElementById('encryptBtn');
const keysBtn = document.getElementById('keysBtn');

let currentResult = null;
let showKeys = false;
let openRound = null;

function updateCount(input, counter) { const len = input.value.length; counter.textContent = `${len} / 32`; counter.className = 'char-count ' + (len === 32 ? 'ok' : len > 0 ? 'bad' : ''); }
function filterHex(e) { e.target.value = e.target.value.replace(/[^0-9a-fA-F]/g,'').slice(0,32); }
msgInput.addEventListener('input', function(e) { filterHex(e); updateCount(msgInput, msgCount); });
keyInput.addEventListener('input', function(e) { filterHex(e); updateCount(keyInput, keyCount); });
msgInput.value = '3243f6a8885a308d313198a2e0370734';
keyInput.value = '2b7e151628aed2a6abf7158809cf4f3c';
updateCount(msgInput, msgCount);
updateCount(keyInput, keyCount);

encryptBtn.addEventListener('click', function() {
  const msg = hexToState(msgInput.value);
  const key = hexToState(keyInput.value);
  if (!msg || !key) { errorBox.textContent = 'Both Plaintext and Key must be exactly 32 valid hex characters.'; errorBox.style.display = 'block'; currentResult = null; output.innerHTML = ''; return; }
  errorBox.style.display = 'none';
  currentResult = aesEncrypt(msg, key);
  openRound = null;
  renderOutput();
});
keysBtn.addEventListener('click', function() { showKeys = !showKeys; keysBtn.textContent = (showKeys ? 'Hide' : 'Show') + ' Key Schedule'; keysBtn.classList.toggle('active', showKeys); renderOutput(); });

function renderOutput() {
  if (!currentResult) { output.innerHTML = ''; return; }
  const r = currentResult;
  let html = '';
  html += `<div class="result-card cipher"><div class="section-label">Ciphertext</div><div style="display:flex; flex-wrap:wrap; align-items:flex-start; gap:16px;">${renderMatrix(r.ciphertext, 'State Matrix', 'result', true)}<div style="flex:1; min-width:200px; display:flex; align-items:center;"><div><div class="matrix-label result" style="margin-bottom:6px">Hex Output</div><div class="cipher-hex">${stateToHexStr(r.ciphertext)}</div></div></div></div></div>`;
  if (showKeys) { html += `<div class="result-card"><div class="section-label">Key Expansion — Round Keys 0 through 10</div><div class="keys-grid">${r.roundKeys.map((rk,i) => renderMatrix(rk, 'RK '+i, 'key', false)).join('')}</div></div>`; }
  html += `<div class="section-label" style="margin-bottom:10px; margin-top:8px;">Round-by-Round Details</div>`;
  r.rounds.forEach((rd, idx) => {
    const isOpen = openRound === idx;
    html += `<div class="round-item${isOpen?' open':''}" id="round-${idx}"><div class="round-header" onclick="toggleRound(${idx})"><span class="round-name">${rd.label}</span><span class="arrow">▾</span></div>${isOpen ? `<div class="round-body">${rd.subBytes ? renderMatrix(rd.subBytes, 'SubBytes', 'sub', false) : ''}${rd.shiftRows ? renderMatrix(rd.shiftRows, 'ShiftRows', 'shift', false) : ''}${rd.mixColumns ? renderMatrix(rd.mixColumns, 'MixColumns', 'mix', false) : ''}${renderMatrix(rd.roundKey, 'Round Key', 'key', false)}${renderMatrix(rd.addRoundKey, 'After AddRoundKey', 'result', true)}</div>` : ''}</div>`;
  });
  output.innerHTML = html;
}
function toggleRound(idx) { openRound = openRound === idx ? null : idx; renderOutput(); }

const chatFab = document.getElementById('chatFab');
const chatPanel = document.getElementById('chatPanel');
const chatClose = document.getElementById('chatClose');
const chatMessages = document.getElementById('chatMessages');
const chatInput = document.getElementById('chatInput');
const chatSend = document.getElementById('chatSend');

const knowledge = [
  { keys:['what is aes','about aes','explain aes','aes stands','what does aes'], a:`<strong>AES</strong> stands for <strong>Advanced Encryption Standard</strong>. It's a symmetric block cipher standardized by NIST in 2001 (FIPS 197) that replaced DES. AES-128 uses a 128-bit key and encrypts data in 128-bit blocks through 10 rounds of transformations. It's used everywhere: HTTPS, WiFi (WPA2/3), disk encryption, messaging apps, and more.` },
  { keys:['how to use','how do i use','how does this work','how to run','instructions','guide','tutorial','getting started','how use'], a:`Using this tool:<br>1. Enter a <strong>32 hex character</strong> plaintext (16 bytes)<br>2. Enter a <strong>32 hex character</strong> key<br>3. Click <strong>Encrypt</strong><br>4. Click any round (0–10) to expand and see <code>SubBytes</code>, <code>ShiftRows</code>, <code>MixColumns</code>, and <code>AddRoundKey</code> states<br>5. Click <strong>Show Key Schedule</strong> to view all 11 round keys<br><br>The tool comes pre-loaded with the official FIPS 197 test vector so you can verify correctness.` },
  { keys:['subbytes','sub bytes','s-box','sbox','substitution'], a:`<strong>SubBytes</strong> is a non-linear byte substitution step. Every byte in the state is replaced by looking it up in the <strong>S-Box</strong> (a precomputed 256-entry table). This is the main source of AES's confusion property. It resists linear and differential cryptanalysis because the S-Box is built from the multiplicative inverse in GF(2⁸) followed by an affine transformation.` },
  { keys:['shiftrows','shift rows','row shift'], a:`<strong>ShiftRows</strong> cyclically shifts the rows of the state matrix to the left:<br>• Row 0: no shift<br>• Row 1: shift left by 1<br>• Row 2: shift left by 2<br>• Row 3: shift left by 3<br><br>This, combined with MixColumns, provides diffusion — making every input byte affect every output byte after a few rounds.` },
  { keys:['mixcolumns','mix columns','column mix'], a:`<strong>MixColumns</strong> treats each column of the state as a polynomial over GF(2⁸) and multiplies it by a fixed polynomial. Each output byte in a column depends on all 4 input bytes in that column. This gives strong diffusion. It's skipped in the final round for a mathematical reason: it would make decryption structurally different without adding security.` },
  { keys:['addroundkey','add round key','xor key','round key xor'], a:`<strong>AddRoundKey</strong> is simply an XOR between the state and the round key. It's the only step that actually uses the key, and it's what makes AES key-dependent. AES applies it 11 times total: once before round 1, and once at the end of each of the 10 rounds.` },
  { keys:['key expansion','key schedule','round keys','expand key','how keys'], a:`<strong>Key Expansion</strong> generates 11 round keys (RK0–RK10) from the original 128-bit key:<br>• Start with 4 words (16 bytes) from the original key<br>• Generate 40 more words using <code>RotWord</code>, <code>SubWord</code>, and XOR with round constants (Rcon)<br>• Every 4th word uses RotWord + SubWord + Rcon XOR<br>• All other words are just XOR of the previous word and the word 4 positions back<br><br>Click <strong>Show Key Schedule</strong> in the app to see all 11 round keys.` },
  { keys:['rounds','how many rounds','number of rounds','round count'], a:`AES-128 uses exactly <strong>10 rounds</strong>, plus one initial <code>AddRoundKey</code>. Each middle round (1–9) does: SubBytes → ShiftRows → MixColumns → AddRoundKey. The final round (10) skips MixColumns. AES-192 uses 12 rounds and AES-256 uses 14 rounds.` },
  { keys:['lookup table','why lookup','sbox table','t-box','why table'], a:`<strong>Lookup tables</strong> make AES fast in software. Instead of computing the S-Box (inverse in GF(2⁸) + affine map) for every byte, the 256 values are precomputed and stored as an array. More advanced implementations use "T-tables" that combine SubBytes, ShiftRows, and MixColumns into one table lookup per byte — but they have cache-timing vulnerabilities, which is why modern CPUs use <strong>AES-NI</strong> hardware instructions.` },
  { keys:['gf','galois','finite field','gmul','multiplication','xtime'], a:`AES operates in <strong>GF(2⁸)</strong> — the Galois field of 256 elements. Bytes are treated as polynomials over GF(2). Addition is XOR. Multiplication uses the irreducible polynomial <code>x⁸ + x⁴ + x³ + x + 1</code> (0x11B). MixColumns needs multiplication by 2 and 3 in this field — that's what our <code>gmul()</code> function implements.` },
  { keys:['invalid','error','not working','wrong input','broken','bug'], a:`Most errors come from input format. Check:<br>• Input is exactly <strong>32 characters</strong> (16 bytes = 32 hex digits)<br>• Only uses <strong>0–9 and a–f</strong> (hex digits)<br>• No spaces or other characters<br><br>The character counter next to each input turns <span style="color:#00e676">green</span> when valid. If it's <span style="color:#ff5252">red</span>, input is incomplete or invalid.` },
  { keys:['hex','hexadecimal','what hex'], a:`<strong>Hexadecimal</strong> is base-16: digits 0–9 and a–f. Each hex character represents 4 bits, so 2 hex characters = 1 byte. AES-128 needs 16 bytes = 32 hex characters for both input and key.<br>Example: the byte 255 is <code>FF</code> in hex.` },
  { keys:['test vector','example','sample','fips','default','preloaded'], a:`The tool is pre-loaded with the official NIST <strong>FIPS 197 Appendix B</strong> test vector:<br>• Plaintext: <code>3243F6A8885A308D313198A2E0370734</code><br>• Key: <code>2B7E151628AED2A6ABF7158809CF4F3C</code><br>• Expected Ciphertext: <code>3925841D02DC09FBDC118597196A0B32</code><br><br>If you get that ciphertext, the implementation is correct.` },
  { keys:['state','matrix','4x4','4 by 4','column major'], a:`The AES <strong>state</strong> is a 4×4 byte matrix. The 16 input bytes are placed column by column:<br>• Byte 0 → row 0, col 0<br>• Byte 1 → row 1, col 0<br>• Byte 4 → row 0, col 1<br>• ...and so on<br><br>This is called <strong>column-major</strong> ordering. All AES operations work on this 4×4 matrix.` },
  { keys:['rcon','round constant'], a:`<strong>Rcon</strong> (round constants) are used in key expansion. Rcon[i] = (2^(i-1) mod 0x11B, 0, 0, 0) in GF(2⁸). Values: <code>01, 02, 04, 08, 10, 20, 40, 80, 1B, 36</code>. They break symmetry in the key schedule, preventing related-key attacks.` },
  { keys:['decrypt','decryption','reverse','inverse'], a:`This tool only does <strong>encryption</strong>. Decryption runs the rounds in reverse using InvSubBytes, InvShiftRows, and InvMixColumns, with the round keys applied in reverse order (RK10 → RK0). The inverse S-Box is a separate lookup table.` },
  { keys:['secure','safe','broken','cracked','security','attack'], a:`AES-128 is <strong>still considered secure</strong> in 2026. The best known attack (biclique cryptanalysis) reduces security from 2¹²⁸ to about 2¹²⁶·¹ — practically irrelevant. AES's weaknesses in practice come from <strong>implementation flaws</strong>: side-channel attacks, cache timing, poor random number generation, or bad modes of operation (like ECB).` },
  { keys:['who','team','authors','students','made this','who made'], a:`This tool was built for <strong>EECE 455</strong> by:<br>• Jad Moharam<br>• Mohamed Dayeh<br>• Mohamad Taha<br>• Ali Waked` },
  { keys:['github','source','code','repo','repository'], a:`The source code is hosted on GitHub Pages. You can view the full HTML/JS implementation directly in the page source (right-click → View Page Source).` },
  { keys:['ecb','cbc','mode','modes','block mode'], a:`AES is a <strong>block cipher</strong> — it only encrypts one 128-bit block. To encrypt more data, you use a <strong>mode of operation</strong>:<br>• <strong>ECB</strong>: encrypt each block independently (insecure, patterns leak)<br>• <strong>CBC</strong>: XOR previous ciphertext with next plaintext<br>• <strong>CTR</strong>: turns AES into a stream cipher<br>• <strong>GCM</strong>: authenticated encryption, modern standard<br><br>This tool demonstrates the raw block cipher — one block, no mode.` },
  { keys:['hi','hello','hey','sup'], a:`Hey! I can answer questions about AES, the operations inside it, how to use this visualizer, or troubleshoot input errors. Try one of the quick buttons below or ask anything.` },
  { keys:['thank','thanks'], a:`Anytime. Good luck with your project!` }
];

const quickQs = ['What is AES?','How do I use this?','Explain SubBytes','What is key expansion?','Why lookup tables?','Test vector?'];

function addMessage(text, role) { const msg = document.createElement('div'); msg.className = 'msg ' + role; msg.innerHTML = text; chatMessages.appendChild(msg); chatMessages.scrollTop = chatMessages.scrollHeight; }
function findAnswer(q) { const lower = q.toLowerCase().trim(); let best = null, bestScore = 0; for (const entry of knowledge) { let score = 0; for (const k of entry.keys) if (lower.includes(k)) score += k.length; if (score > bestScore) { bestScore = score; best = entry; } } if (best) return best.a; return `I'm not sure about that specific question. Try asking about:<br>• <strong>AES operations</strong> (SubBytes, ShiftRows, MixColumns, AddRoundKey)<br>• <strong>Key expansion</strong> or <strong>round keys</strong><br>• <strong>How to use</strong> this visualizer<br>• <strong>Lookup tables</strong> or <strong>GF(2⁸)</strong> math<br>• Input <strong>errors</strong> or <strong>hex format</strong>`; }
function sendMessage() { const q = chatInput.value.trim(); if (!q) return; addMessage(q, 'user'); chatInput.value = ''; setTimeout(() => addMessage(findAnswer(q), 'bot'), 350); }

chatFab.addEventListener('click', () => {
  chatPanel.classList.add('open'); chatFab.classList.add('hidden');
  if (chatMessages.children.length === 0) addMessage(`Hi! I'm your <strong>AES Assistant</strong>. Ask me about AES-128, any of the round operations, key expansion, or how to use this tool.`, 'bot');
  chatInput.focus();
});
chatClose.addEventListener('click', () => { chatPanel.classList.remove('open'); chatFab.classList.remove('hidden'); });
chatSend.addEventListener('click', sendMessage);
chatInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

quickQs.forEach(q => { const btn = document.createElement('button'); btn.className = 'quick-btn'; btn.textContent = q; btn.addEventListener('click', () => { chatInput.value = q; sendMessage(); }); chatQuick.appendChild(btn); });
</script>
